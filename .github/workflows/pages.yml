name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false   # never cancel an in-flight Pages deploy; queue instead

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install Honkit and mermaid-cli
        run: npm install -g honkit @mermaid-js/mermaid-cli
      - name: Render diagrams and stage the web source
        run: python3 book/web-render.py
      - name: Build the site with Honkit
        run: honkit build book/web-src
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: book/web-src/_book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.d1.outputs.page_url }}
    steps:
      # actions/deploy-pages occasionally fails with a transient
      # "Deployment failed, try again later" from the Pages API. Auto-retry with
      # backoff so a flake never surfaces as a failed run; only a genuine, repeated
      # failure fails the job.
      - name: Deploy to Pages (attempt 1)
        id: d1
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Back off before retry
        if: steps.d1.outcome == 'failure'
        run: sleep 20
      - name: Deploy to Pages (attempt 2)
        id: d2
        if: steps.d1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Back off before final attempt
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        run: sleep 30
      - name: Deploy to Pages (final attempt)
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        uses: actions/deploy-pages@v4
